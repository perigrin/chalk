# ABOUTME: GitHub Action to profile self-hosting.t using Devel::NYTProf
# ABOUTME: Generates HTML report for Perl 5.42 (unthreaded)
name: NYTProf Profiling

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  profile:
    runs-on: ubuntu-latest

    container:
      image: perl:5.42

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Devel::NYTProf
        run: |
          cpan -T Devel::NYTProf

      - name: Verify Perl version
        run: |
          perl -v

      - name: Run self-hosting.t under NYTProf
        run: |
          echo "## NYTProf Profiling" >> $GITHUB_STEP_SUMMARY

          perl -d:NYTProf t/self-hosting.t

          echo "Profile data generated" >> $GITHUB_STEP_SUMMARY

      - name: Generate HTML report
        run: |
          nytprofhtml --out nytprof-report

          echo "HTML report generated" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup raw profiling data
        run: |
          rm -f nytprof.out
          echo "Cleaned up raw profiling data to save disk space" >> $GITHUB_STEP_SUMMARY

      - name: Upload NYTProf report
        uses: actions/upload-artifact@v4
        with:
          name: nytprof-report
          path: nytprof-report/
